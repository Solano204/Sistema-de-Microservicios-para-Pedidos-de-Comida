name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

defaults:
  run:
    working-directory: food-ordering-system

jobs:
  build-and-test:
    name: Build & test (all modules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: mvn clean verify
        run: mvn -B clean verify

      - name: Publish surefire test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/*.txt'
          retention-days: 7

  docker-images:
    name: Build & push Docker image (${{ matrix.service }})
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: order-service
            module: order-service/order-container
          - service: payment-service
            module: payment-service/payment-container
          - service: restaurant-service
            module: restaurant-service/restaurant-container
          - service: customer-service
            module: customer-service/customer-container
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        id: image
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${OWNER_LC}/${{ matrix.service }}" >> "$GITHUB_OUTPUT"

      - name: Build image with Cloud Native Buildpacks
        run: >
          mvn -B -pl ${{ matrix.module }} -am install -DskipTests
          -Dspring-boot.build-image.imageName=${{ steps.image.outputs.name }}:${{ github.sha }}

      - name: Tag :latest
        run: docker tag ${{ steps.image.outputs.name }}:${{ github.sha }} ${{ steps.image.outputs.name }}:latest

      - name: Push image
        run: |
          docker push ${{ steps.image.outputs.name }}:${{ github.sha }}
          docker push ${{ steps.image.outputs.name }}:latest
