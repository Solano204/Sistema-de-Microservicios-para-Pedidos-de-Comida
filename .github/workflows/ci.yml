name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: food-ordering-system

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & test (all Java modules)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: mvn clean verify
        run: mvn -B clean verify

      - name: Publish surefire test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/*.txt'
          retention-days: 7

  frontend-build-and-test:
    name: Build & test (frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: food-ordering-system/react-frontend/react-frontend
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: food-ordering-system/react-frontend/react-frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm test -- --run
      - run: npm run build

  docker-images:
    name: Build, scan, sign & push Docker image (${{ matrix.service }})
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      id-token: write      # cosign keyless signing (OIDC)
      security-events: write  # upload Trivy SARIF to the Security tab
    strategy:
      matrix:
        include:
          - service: order-service
            module: order-service/order-container
          - service: payment-service
            module: payment-service/payment-container
          - service: restaurant-service
            module: restaurant-service/restaurant-container
          - service: customer-service
            module: customer-service/customer-container
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        id: image
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${OWNER_LC}/${{ matrix.service }}" >> "$GITHUB_OUTPUT"

      - name: Build image with Cloud Native Buildpacks
        run: >
          mvn -B -pl ${{ matrix.module }} -am install -DskipTests
          -Dspring-boot.build-image.imageName=${{ steps.image.outputs.name }}:${{ github.sha }}

      # exit-code 0: report findings without blocking the pipeline. Flip to
      # '1' once you've triaged the first run's results and know what's a
      # real problem vs. an accepted base-image CVE.
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.name }}:${{ github.sha }}
          format: sarif
          output: trivy-results-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy results to the Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@08d09a53f0f5d694f253bd25732e4429c9e9337f # v3
        with:
          sarif_file: trivy-results-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      - name: Tag :latest
        run: docker tag ${{ steps.image.outputs.name }}:${{ github.sha }} ${{ steps.image.outputs.name }}:latest

      - name: Push image
        run: |
          docker push ${{ steps.image.outputs.name }}:${{ github.sha }}
          docker push ${{ steps.image.outputs.name }}:latest

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign image (keyless, via GitHub OIDC)
        run: |
          cosign sign --yes ${{ steps.image.outputs.name }}:${{ github.sha }}
          cosign sign --yes ${{ steps.image.outputs.name }}:latest

  frontend-image:
    name: Build, scan, sign & push Docker image (frontend)
    needs: frontend-build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        id: image
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${OWNER_LC}/frontend" >> "$GITHUB_OUTPUT"

      - name: Build (local only, so it can be scanned before anything is pushed)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: food-ordering-system/react-frontend/react-frontend
          push: false
          load: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.name }}:${{ github.sha }}
          format: sarif
          output: trivy-results-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy results to the Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@08d09a53f0f5d694f253bd25732e4429c9e9337f # v3
        with:
          sarif_file: trivy-results-frontend.sarif
          category: trivy-frontend

      - name: Push
        run: |
          docker push ${{ steps.image.outputs.name }}:${{ github.sha }}
          docker push ${{ steps.image.outputs.name }}:latest

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign image (keyless, via GitHub OIDC)
        run: |
          cosign sign --yes ${{ steps.image.outputs.name }}:${{ github.sha }}
          cosign sign --yes ${{ steps.image.outputs.name }}:latest
