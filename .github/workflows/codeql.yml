name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Catches newly-disclosed vulnerability patterns even in weeks with no commits.
    - cron: '17 3 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        if: matrix.language == 'java-kotlin'
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@08d09a53f0f5d694f253bd25732e4429c9e9337f # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # CodeQL needs Java actually compiled to analyze it; JS/TS is scanned
      # source-only (build-mode: none), no build step needed for it.
      - name: Build Java modules
        if: matrix.language == 'java-kotlin'
        working-directory: food-ordering-system
        run: mvn -B -DskipTests clean compile

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@08d09a53f0f5d694f253bd25732e4429c9e9337f # v3
        with:
          category: /language:${{ matrix.language }}
