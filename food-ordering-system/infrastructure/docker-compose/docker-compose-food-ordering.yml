version: '3.8'

# ── Doc 2 hardening notes ──────────────────────────────────────────────────
# - Network: single network. Unlike a gateway-fronted system, nothing here
#   calls out to the internet (no AWS/OpenAI-style dependency) and the
#   services never call each other over REST - the saga is choreographed
#   entirely through Kafka/Debezium. An edge/backend/data 3-tier split (as
#   used in bigger systems) has no real edge component to justify it here.
#   Marking this network `internal: true` would be the natural next step
#   since nothing needs outbound internet - deliberately NOT doing that here:
#   every service in this file also has a host `ports:` mapping, and whether
#   published ports stay reliably reachable on an `internal: true` bridge
#   network is inconsistent across Docker Engine/Desktop versions (known
#   moby/moby reports of DNAT rules not being set up for internal networks).
#   Getting that wrong would silently make every service unreachable from the
#   host, and this can't be verified without running `docker compose up`,
#   which is out of scope for this pass. Flagging as a candidate to test and
#   flip yourself: try `internal: true`, confirm `localhost:8181` etc. still
#   respond, keep it if so.
# - Secrets: Postgres password now comes from a Docker secret file, not a
#   plaintext env var. The 4 Spring services pick it up via Spring's native
#   `configtree:` config-data import (Spring Boot 2.4+), not a custom
#   entrypoint script - see the `SPRING_CONFIG_IMPORT` + `secrets:` block on
#   each service. Fill in infrastructure/docker-compose/secrets/postgres_password.txt
#   with your own value; it's gitignored.
# - Debezium connectors are now registered by a dedicated one-shot service
#   (debezium-connector-init) instead of a manually-run curl script - the old
#   start-up.sh script pointed at `host.docker.internal`, which doesn't match
#   this file's topology (Postgres runs as a container on this network, not
#   on the Docker host). See register-connectors.sh for the PUT-based
#   idempotent registration logic (same pattern as debezium/register.sh in
#   the NEXUS reference project).
# - Healthchecks + `condition: service_healthy` added throughout so
#   `depends_on` actually waits for readiness, not just container start.
# - `security_opt: no-new-privileges` added everywhere (cheap, no downside).
#   Deferring `read_only`/`cap_drop: ALL` to the Dockerfile-hardening pass
#   (Doc 3) until each service's actual filesystem/capability needs are
#   confirmed.
# - kafka-ui is behind the `observability` profile - it's an optional admin
#   UI, not required for the saga to function.
# - Skipped: separate compose.override.yml / prod split (Fase 9.2). This is a
#   single local-dev environment with no separate deployment target today: a
#   prod-only file would never actually be used. Revisit if/when this gets a
#   real deployment target.
# - Not fixed here: JVM heap sizing. These images are built via Spring Boot
#   Buildpacks (see order-container/pom.xml's build-image goal), not a
#   Dockerfile - Paketo's buildpack already runs a memory calculator that
#   sizes the heap from the container's cgroup memory limit automatically, so
#   setting `mem_limit` below is sufficient; no manual -XX:MaxRAMPercentage
#   needed. Covered further in Doc 3.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-security: &default-security
  security_opt:
    - no-new-privileges:true

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt

services:
  # PostgreSQL Database
  postgres:
    image: postgres:17.2-alpine
    hostname: postgres
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_MULTIPLE_DATABASES: order,payment,restaurant,customer
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=trust"
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "max_replication_slots=4"
      - "-c"
      - "wal_level=logical"  # Required for Debezium CDC
    volumes:
      - "./volumes/postgres:/var/lib/postgresql/data"
      - "./init-scripts:/docker-entrypoint-initdb.d"
    networks:
      - food-ordering-network
    secrets:
      - postgres_password
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:${KAFKA_VERSION:-7.2.5}
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_SERVERS: zookeeper:2888:3888
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok"
    volumes:
      - "./volumes/zookeeper/data:/var/lib/zookeeper/data"
      - "./volumes/zookeeper/transactions:/var/lib/zookeeper/log"
    networks:
      - food-ordering-network
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    logging: *default-logging
    <<: *default-security
    healthcheck:
      # cub (Confluent Utility Belt) ships in every confluentinc image and is
      # what Confluent's own tutorials use for readiness checks - more
      # reliable than assuming `nc` is present in this specific image.
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 5000 || exit 1"]
      interval: 10s
      timeout: 8s
      retries: 6
      start_period: 20s

  # Kafka Brokers
  kafka-broker-1:
    image: confluentinc/cp-kafka:${KAFKA_VERSION:-7.2.5}
    hostname: kafka-broker-1
    container_name: kafka-broker-1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "19092:19092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker-1:9092,LISTENER_LOCAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,LISTENER_LOCAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 3000
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_COMPRESSION_TYPE: producer
    volumes:
      - "./volumes/kafka/broker-1:/var/lib/kafka/data"
    networks:
      - food-ordering-network
    restart: unless-stopped
    mem_limit: 1200m
    cpus: 1.0
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s

  kafka-broker-2:
    image: confluentinc/cp-kafka:${KAFKA_VERSION:-7.2.5}
    hostname: kafka-broker-2
    container_name: kafka-broker-2
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker-2:9092,LISTENER_LOCAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,LISTENER_LOCAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 3000
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_COMPRESSION_TYPE: producer
    volumes:
      - "./volumes/kafka/broker-2:/var/lib/kafka/data"
    networks:
      - food-ordering-network
    restart: unless-stopped
    mem_limit: 1200m
    cpus: 1.0
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s

  kafka-broker-3:
    image: confluentinc/cp-kafka:${KAFKA_VERSION:-7.2.5}
    hostname: kafka-broker-3
    container_name: kafka-broker-3
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "39092:39092"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker-3:9092,LISTENER_LOCAL://localhost:39092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,LISTENER_LOCAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 3000
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_COMPRESSION_TYPE: producer
    volumes:
      - "./volumes/kafka/broker-3:/var/lib/kafka/data"
    networks:
      - food-ordering-network
    restart: unless-stopped
    mem_limit: 1200m
    cpus: 1.0
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s

  # Schema Registry
  schema-registry:
    image: confluentinc/cp-schema-registry:${KAFKA_VERSION:-7.2.5}
    hostname: schema-registry
    container_name: schema-registry
    depends_on:
      kafka-broker-1:
        condition: service_healthy
      kafka-broker-2:
        condition: service_healthy
      kafka-broker-3:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_CONNECTION_URL: "zookeeper:2181"
      SCHEMA_REGISTRY_LISTENERS: http://schema-registry:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka-broker-1:9092,PLAINTEXT://kafka-broker-2:9092,PLAINTEXT://kafka-broker-3:9092
      SCHEMA_REGISTRY_DEBUG: "true"
    networks:
      - food-ordering-network
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # Debezium Kafka Connect
  kafka-debezium-connector:
    image: my-debezium-connect:latest
    hostname: kafka-debezium-connector
    container_name: kafka-debezium-connector
    depends_on:
      postgres:
        condition: service_healthy
      kafka-broker-1:
        condition: service_healthy
      kafka-broker-2:
        condition: service_healthy
      kafka-broker-3:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      CONNECT_GROUP_ID: "food-ordering-connect-cluster"
      CONNECT_CONFIG_STORAGE_TOPIC: "food-ordering-connect-configs"
      CONNECT_OFFSET_STORAGE_TOPIC: "food-ordering-connect-offsets"
      CONNECT_STATUS_STORAGE_TOPIC: "food-ordering-connect-status"
      CONNECT_BOOTSTRAP_SERVERS: "kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092"
      CONNECT_KEY_CONVERTER: "io.confluent.connect.avro.AvroConverter"
      CONNECT_VALUE_CONVERTER: "io.confluent.connect.avro.AvroConverter"
      CONNECT_KEY_CONVERTER_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      CONNECT_INTERNAL_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_INTERNAL_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-debezium-connector
      CONNECT_PLUGIN_PATH: "/usr/share/java,/kafka/connect,/usr/share/confluent-hub-components"
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 3
    networks:
      - food-ordering-network
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  # Zipkin - in-memory storage (default), not Elasticsearch-backed like the
  # NEXUS reference. NEXUS's ES-backed storage is sized for a much bigger,
  # longer-lived multi-service platform; this project doesn't need trace data
  # to survive a restart, and adding Elasticsearch here just to match NEXUS
  # would be a real new piece of infrastructure to run for no corresponding
  # benefit at this scale. Same image/port convention as NEXUS otherwise.
  zipkin:
    image: openzipkin/zipkin:3.3
    hostname: zipkin
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - food-ordering-network
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9411/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # One-shot: registers the 4 outbox connectors once Connect is healthy.
  # Replaces the manual curl script in start-up.sh (which targeted a
  # different, host-network-based topology).
  debezium-connector-init:
    image: curlimages/curl:8.10.1
    container_name: debezium-connector-init
    depends_on:
      kafka-debezium-connector:
        condition: service_healthy
    volumes:
      - "./register-connectors.sh:/register-connectors.sh:ro"
    entrypoint: ["sh", "/register-connectors.sh"]
    networks:
      - food-ordering-network
    secrets:
      - postgres_password
    restart: "no"
    mem_limit: 64m
    cpus: 0.25
    logging: *default-logging
    <<: *default-security

  # Order Service
  order-service:
    image: com.food.ordering.system/order.service:1.0-SNAPSHOT
    hostname: order-service
    container_name: order-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka-broker-1:
        condition: service_healthy
      kafka-broker-2:
        condition: service_healthy
      kafka-broker-3:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    ports:
      - "8181:8181"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres?currentSchema=order&binaryTransfer=true&reWriteBatchedInserts=true
      SPRING_SQL_INIT_MODE: ALWAYS
      SPRING_SQL_INIT_SCHEMA_LOCATIONS: classpath:init-schema.sql
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQL9Dialect
      SPRING_JPA_PROPERTIES_HIBERNATE_TYPE_PREFERRED_INSTANT_JDBC_TYPE: TIMESTAMP
      KAFKA_CONFIG_BOOTSTRAP_SERVERS: kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092
      KAFKA_CONFIG_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SERVER_PORT: 8181
      LOGGING_LEVEL_COM_FOOD_ORDERING_SYSTEM: DEBUG
    networks:
      - food-ordering-network
    secrets:
      - source: postgres_password
        target: spring.datasource.password
    restart: on-failure
    mem_limit: 768m
    cpus: 1.0
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8181/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # Payment Service
  payment-service:
    image: com.food.ordering.system/payment.service:1.0-SNAPSHOT
    hostname: payment-service
    container_name: payment-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka-broker-1:
        condition: service_healthy
      kafka-broker-2:
        condition: service_healthy
      kafka-broker-3:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    ports:
      - "8182:8182"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      SPRING_SQL_INIT_MODE: ALWAYS
      SPRING_SQL_INIT_SCHEMA_LOCATIONS: classpath:init-schema.sql,classpath:init-data.sql
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres?currentSchema=payment&binaryTransfer=true&reWriteBatchedInserts=true&stringtype=unspecified&connectTimeout=60&socketTimeout=60
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQL9Dialect
      SPRING_JPA_PROPERTIES_HIBERNATE_TYPE_PREFERRED_INSTANT_JDBC_TYPE: TIMESTAMP
      KAFKA_CONFIG_BOOTSTRAP_SERVERS: kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092
      KAFKA_CONFIG_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SERVER_PORT: 8182
      LOGGING_LEVEL_COM_FOOD_ORDERING_SYSTEM: DEBUG
    networks:
      - food-ordering-network
    secrets:
      - source: postgres_password
        target: spring.datasource.password
    restart: on-failure
    mem_limit: 768m
    cpus: 1.0
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8182/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # Restaurant Service
  restaurant-service:
    image: com.food.ordering.system/restaurant.service:1.0-SNAPSHOT
    hostname: restaurant-service
    container_name: restaurant-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka-broker-1:
        condition: service_healthy
      kafka-broker-2:
        condition: service_healthy
      kafka-broker-3:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    ports:
      - "8183:8183"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres?currentSchema=restaurant&binaryTransfer=true&reWriteBatchedInserts=true&stringtype=unspecified&connectTimeout=60&socketTimeout=60
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_SQL_INIT_MODE: ALWAYS
      SPRING_SQL_INIT_SCHEMA_LOCATIONS: classpath:init-schema.sql,classpath:init-data.sql
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQL9Dialect
      SPRING_JPA_PROPERTIES_HIBERNATE_TYPE_PREFERRED_INSTANT_JDBC_TYPE: TIMESTAMP
      KAFKA_CONFIG_BOOTSTRAP_SERVERS: kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092
      KAFKA_CONFIG_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SERVER_PORT: 8183
      LOGGING_LEVEL_COM_FOOD_ORDERING_SYSTEM: DEBUG
    networks:
      - food-ordering-network
    secrets:
      - source: postgres_password
        target: spring.datasource.password
    restart: on-failure
    mem_limit: 768m
    cpus: 1.0
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8183/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # Customer Service
  customer-service:
    image: com.food.ordering.system/customer.service:1.0-SNAPSHOT
    hostname: customer-service
    container_name: customer-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka-broker-1:
        condition: service_healthy
      kafka-broker-2:
        condition: service_healthy
      kafka-broker-3:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    ports:
      - "8184:8184"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres?currentSchema=customer&binaryTransfer=true&reWriteBatchedInserts=true&connectTimeout=60&socketTimeout=60
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_SQL_INIT_MODE: ALWAYS
      SPRING_SQL_INIT_SCHEMA_LOCATIONS: classpath:init-schema.sql
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQL9Dialect
      SPRING_JPA_PROPERTIES_HIBERNATE_TYPE_PREFERRED_INSTANT_JDBC_TYPE: TIMESTAMP
      KAFKA_CONFIG_BOOTSTRAP_SERVERS: kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092
      KAFKA_CONFIG_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SERVER_PORT: 8184
      LOGGING_LEVEL_COM_FOOD_ORDERING_SYSTEM: DEBUG
    networks:
      - food-ordering-network
    secrets:
      - source: postgres_password
        target: spring.datasource.password
    restart: on-failure
    mem_limit: 768m
    cpus: 1.0
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8184/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # Kafka UI for monitoring - optional, not required for the saga to run
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    hostname: kafka-ui
    container_name: kafka-ui
    profiles: ["observability"]
    depends_on:
      kafka-broker-1:
        condition: service_healthy
      kafka-broker-2:
        condition: service_healthy
      kafka-broker-3:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      kafka-debezium-connector:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: food-ordering-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-debezium-connector:8083
    networks:
      - food-ordering-network
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    logging: *default-logging
    <<: *default-security

networks:
  food-ordering-network:
    driver: bridge

volumes:
  debezium-plugins:
    driver: local
