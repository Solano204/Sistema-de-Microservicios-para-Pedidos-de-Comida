version: '3.8'

# ── food-ordering-system: PRODUCTION compose ────────────────────────────────
# Sibling to docker-compose-food-ordering.yml (the local-dev file), not a
# replacement for it. Same Kafka/Zipkin/Debezium/monitoring topology — this
# file only changes what's appropriate for a real deployment target vs a
# laptop:
#
#   - App service images come from ${ORDER_SERVICE_IMAGE}/etc. env vars,
#     defaulting to the same local Buildpack image names the dev file uses
#     (`mvn -pl <module> -am install` from food-ordering-system/, per each
#     *-container/pom.xml's spring-boot-maven-plugin build-image goal).
#     Point these at a registry instead (e.g. ghcr.io/<owner>/order-service:<tag>)
#     by setting the corresponding env var in .env — nothing else in this
#     file needs to change.
#   - Zookeeper/Kafka brokers/Schema Registry/Postgres/Kafka Connect no
#     longer publish host ports. Every container still reaches them over
#     food-ordering-network by service name; the dev file publishes these
#     for local tooling (psql, kafka console tools, curl-ing Schema
#     Registry) that a real deployment target doesn't need exposed.
#   - Trace sampling drops from 100% (dev) to 10% via
#     MANAGEMENT_TRACING_SAMPLING_PROBABILITY, and app log level drops from
#     DEBUG to INFO — both are exactly what TRACING_NOTES.md already flags
#     ("100% in local dev - drop this before pointing at any shared/
#     persistent environment").
#   - Everything else (healthchecks, secrets, mem_limit/cpus, log rotation,
#     no-new-privileges, the observability profile) is unchanged from the
#     dev file — that file was already written prod-style.
#
# ONE-TIME SETUP:
#   - Populate infrastructure/docker-compose/secrets/postgres_password.txt
#     and secrets/grafana_password.txt (both gitignored).
#   - If pointing *_IMAGE vars at a private registry: `docker login` first.
#
# USAGE:
#   docker compose -f docker-compose-prod.yml --profile observability up -d
# ═════════════════════════════════════════════════════════════════════════

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-security: &default-security
  security_opt:
    - no-new-privileges:true

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  grafana_password:
    file: ./secrets/grafana_password.txt

services:
  # PostgreSQL Database
  postgres:
    image: postgres:17.2-alpine
    hostname: postgres
    container_name: postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_MULTIPLE_DATABASES: order,payment,restaurant,customer
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=trust"
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "max_replication_slots=4"
      - "-c"
      - "wal_level=logical"  # Required for Debezium CDC
    volumes:
      - "./volumes/postgres:/var/lib/postgresql/data"
      - "./init-scripts:/docker-entrypoint-initdb.d"
    networks:
      - food-ordering-network
    secrets:
      - postgres_password
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:${KAFKA_VERSION:-7.2.5}
    hostname: zookeeper
    container_name: zookeeper
    environment:
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_SERVERS: zookeeper:2888:3888
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok"
    volumes:
      - "./volumes/zookeeper/data:/var/lib/zookeeper/data"
      - "./volumes/zookeeper/transactions:/var/lib/zookeeper/log"
    networks:
      - food-ordering-network
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 5000 || exit 1"]
      interval: 10s
      timeout: 8s
      retries: 6
      start_period: 20s

  # Kafka Brokers
  kafka-broker-1:
    image: confluentinc/cp-kafka:${KAFKA_VERSION:-7.2.5}
    hostname: kafka-broker-1
    container_name: kafka-broker-1
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker-1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 3000
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_COMPRESSION_TYPE: producer
    volumes:
      - "./volumes/kafka/broker-1:/var/lib/kafka/data"
    networks:
      - food-ordering-network
    restart: unless-stopped
    mem_limit: 1200m
    cpus: 1.0
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s

  kafka-broker-2:
    image: confluentinc/cp-kafka:${KAFKA_VERSION:-7.2.5}
    hostname: kafka-broker-2
    container_name: kafka-broker-2
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker-2:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 3000
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_COMPRESSION_TYPE: producer
    volumes:
      - "./volumes/kafka/broker-2:/var/lib/kafka/data"
    networks:
      - food-ordering-network
    restart: unless-stopped
    mem_limit: 1200m
    cpus: 1.0
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s

  kafka-broker-3:
    image: confluentinc/cp-kafka:${KAFKA_VERSION:-7.2.5}
    hostname: kafka-broker-3
    container_name: kafka-broker-3
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker-3:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 3000
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_COMPRESSION_TYPE: producer
    volumes:
      - "./volumes/kafka/broker-3:/var/lib/kafka/data"
    networks:
      - food-ordering-network
    restart: unless-stopped
    mem_limit: 1200m
    cpus: 1.0
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s

  # Schema Registry
  schema-registry:
    image: confluentinc/cp-schema-registry:${KAFKA_VERSION:-7.2.5}
    hostname: schema-registry
    container_name: schema-registry
    depends_on:
      kafka-broker-1:
        condition: service_healthy
      kafka-broker-2:
        condition: service_healthy
      kafka-broker-3:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_CONNECTION_URL: "zookeeper:2181"
      SCHEMA_REGISTRY_LISTENERS: http://schema-registry:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka-broker-1:9092,PLAINTEXT://kafka-broker-2:9092,PLAINTEXT://kafka-broker-3:9092
    networks:
      - food-ordering-network
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # Debezium Kafka Connect
  kafka-debezium-connector:
    build:
      context: .
      dockerfile: dockerfile
    image: my-debezium-connect:latest
    hostname: kafka-debezium-connector
    container_name: kafka-debezium-connector
    depends_on:
      postgres:
        condition: service_healthy
      kafka-broker-1:
        condition: service_healthy
      kafka-broker-2:
        condition: service_healthy
      kafka-broker-3:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    environment:
      CONNECT_GROUP_ID: "food-ordering-connect-cluster"
      CONNECT_CONFIG_STORAGE_TOPIC: "food-ordering-connect-configs"
      CONNECT_OFFSET_STORAGE_TOPIC: "food-ordering-connect-offsets"
      CONNECT_STATUS_STORAGE_TOPIC: "food-ordering-connect-status"
      CONNECT_BOOTSTRAP_SERVERS: "kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092"
      CONNECT_KEY_CONVERTER: "io.confluent.connect.avro.AvroConverter"
      CONNECT_VALUE_CONVERTER: "io.confluent.connect.avro.AvroConverter"
      CONNECT_KEY_CONVERTER_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      CONNECT_INTERNAL_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_INTERNAL_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-debezium-connector
      CONNECT_PLUGIN_PATH: "/usr/share/java,/kafka/connect,/usr/share/confluent-hub-components"
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 3
    networks:
      - food-ordering-network
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  # Zipkin - in-memory storage, same as dev (see TRACING_NOTES.md for why
  # this project doesn't need NEXUS's Elasticsearch-backed storage).
  zipkin:
    image: openzipkin/zipkin:3.3
    hostname: zipkin
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - food-ordering-network
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9411/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # One-shot: registers the 4 outbox connectors once Connect is healthy.
  debezium-connector-init:
    image: curlimages/curl:8.10.1
    container_name: debezium-connector-init
    depends_on:
      kafka-debezium-connector:
        condition: service_healthy
    volumes:
      - "./register-connectors.sh:/register-connectors.sh:ro"
    entrypoint: ["sh", "/register-connectors.sh"]
    networks:
      - food-ordering-network
    secrets:
      - postgres_password
    restart: "no"
    mem_limit: 64m
    cpus: 0.25
    logging: *default-logging
    <<: *default-security

  # Order Service
  order-service:
    image: ${ORDER_SERVICE_IMAGE:-com.food.ordering.system/order.service:1.0-SNAPSHOT}
    hostname: order-service
    container_name: order-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka-broker-1:
        condition: service_healthy
      kafka-broker-2:
        condition: service_healthy
      kafka-broker-3:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    ports:
      - "8181:8181"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.1"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres?currentSchema=order&binaryTransfer=true&reWriteBatchedInserts=true
      SPRING_SQL_INIT_MODE: ALWAYS
      SPRING_SQL_INIT_SCHEMA_LOCATIONS: classpath:init-schema.sql
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQL9Dialect
      SPRING_JPA_PROPERTIES_HIBERNATE_TYPE_PREFERRED_INSTANT_JDBC_TYPE: TIMESTAMP
      KAFKA_CONFIG_BOOTSTRAP_SERVERS: kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092
      KAFKA_CONFIG_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SERVER_PORT: 8181
      LOGGING_LEVEL_COM_FOOD_ORDERING_SYSTEM: INFO
    networks:
      - food-ordering-network
    secrets:
      - source: postgres_password
        target: spring.datasource.password
    restart: on-failure
    mem_limit: 768m
    cpus: 1.0
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8181/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # Payment Service
  payment-service:
    image: ${PAYMENT_SERVICE_IMAGE:-com.food.ordering.system/payment.service:1.0-SNAPSHOT}
    hostname: payment-service
    container_name: payment-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka-broker-1:
        condition: service_healthy
      kafka-broker-2:
        condition: service_healthy
      kafka-broker-3:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    ports:
      - "8182:8182"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.1"
      SPRING_SQL_INIT_MODE: ALWAYS
      SPRING_SQL_INIT_SCHEMA_LOCATIONS: classpath:init-schema.sql,classpath:init-data.sql
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres?currentSchema=payment&binaryTransfer=true&reWriteBatchedInserts=true&stringtype=unspecified&connectTimeout=60&socketTimeout=60
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQL9Dialect
      SPRING_JPA_PROPERTIES_HIBERNATE_TYPE_PREFERRED_INSTANT_JDBC_TYPE: TIMESTAMP
      KAFKA_CONFIG_BOOTSTRAP_SERVERS: kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092
      KAFKA_CONFIG_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SERVER_PORT: 8182
      LOGGING_LEVEL_COM_FOOD_ORDERING_SYSTEM: INFO
    networks:
      - food-ordering-network
    secrets:
      - source: postgres_password
        target: spring.datasource.password
    restart: on-failure
    mem_limit: 768m
    cpus: 1.0
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8182/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # Restaurant Service
  restaurant-service:
    image: ${RESTAURANT_SERVICE_IMAGE:-com.food.ordering.system/restaurant.service:1.0-SNAPSHOT}
    hostname: restaurant-service
    container_name: restaurant-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka-broker-1:
        condition: service_healthy
      kafka-broker-2:
        condition: service_healthy
      kafka-broker-3:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    ports:
      - "8183:8183"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.1"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres?currentSchema=restaurant&binaryTransfer=true&reWriteBatchedInserts=true&stringtype=unspecified&connectTimeout=60&socketTimeout=60
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_SQL_INIT_MODE: ALWAYS
      SPRING_SQL_INIT_SCHEMA_LOCATIONS: classpath:init-schema.sql,classpath:init-data.sql
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQL9Dialect
      SPRING_JPA_PROPERTIES_HIBERNATE_TYPE_PREFERRED_INSTANT_JDBC_TYPE: TIMESTAMP
      KAFKA_CONFIG_BOOTSTRAP_SERVERS: kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092
      KAFKA_CONFIG_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SERVER_PORT: 8183
      LOGGING_LEVEL_COM_FOOD_ORDERING_SYSTEM: INFO
    networks:
      - food-ordering-network
    secrets:
      - source: postgres_password
        target: spring.datasource.password
    restart: on-failure
    mem_limit: 768m
    cpus: 1.0
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8183/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # Customer Service
  customer-service:
    image: ${CUSTOMER_SERVICE_IMAGE:-com.food.ordering.system/customer.service:1.0-SNAPSHOT}
    hostname: customer-service
    container_name: customer-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka-broker-1:
        condition: service_healthy
      kafka-broker-2:
        condition: service_healthy
      kafka-broker-3:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      zipkin:
        condition: service_healthy
    ports:
      - "8184:8184"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: "optional:configtree:/run/secrets/"
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.1"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres?currentSchema=customer&binaryTransfer=true&reWriteBatchedInserts=true&connectTimeout=60&socketTimeout=60
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_SQL_INIT_MODE: ALWAYS
      SPRING_SQL_INIT_SCHEMA_LOCATIONS: classpath:init-schema.sql
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQL9Dialect
      SPRING_JPA_PROPERTIES_HIBERNATE_TYPE_PREFERRED_INSTANT_JDBC_TYPE: TIMESTAMP
      KAFKA_CONFIG_BOOTSTRAP_SERVERS: kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092
      KAFKA_CONFIG_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SERVER_PORT: 8184
      LOGGING_LEVEL_COM_FOOD_ORDERING_SYSTEM: INFO
    networks:
      - food-ordering-network
    secrets:
      - source: postgres_password
        target: spring.datasource.password
    restart: on-failure
    mem_limit: 768m
    cpus: 1.0
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8184/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  # Kafka UI for monitoring - optional, not required for the saga to run
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    hostname: kafka-ui
    container_name: kafka-ui
    profiles: ["observability"]
    depends_on:
      kafka-broker-1:
        condition: service_healthy
      kafka-broker-2:
        condition: service_healthy
      kafka-broker-3:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      kafka-debezium-connector:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: food-ordering-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-debezium-connector:8083
    networks:
      - food-ordering-network
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    logging: *default-logging
    <<: *default-security

  # ── Monitoring (right-sized subset of NEXUS's stack — see MONITORING_NOTES.md) ──
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    hostname: postgres-exporter
    container_name: postgres-exporter
    profiles: ["observability"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_URI: "postgres:5432/postgres?sslmode=disable"
      DATA_SOURCE_USER: postgres
      DATA_SOURCE_PASS_FILE: /run/secrets/postgres_password
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "true"
    networks:
      - food-ordering-network
    secrets:
      - postgres_password
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.25
    logging: *default-logging
    <<: *default-security

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    hostname: cadvisor
    container_name: cadvisor
    profiles: ["observability"]
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - "/:/rootfs:ro"
      - "/var/run:/var/run:ro"
      - "/sys:/sys:ro"
      - "/var/lib/docker/:/var/lib/docker:ro"
      - "/dev/disk/:/dev/disk:ro"
    ports:
      - "9280:8080"
    networks:
      - food-ordering-network
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  prometheus:
    image: prom/prometheus:v2.51.0
    hostname: prometheus
    container_name: prometheus
    profiles: ["observability"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - "./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
      - "./volumes/prometheus:/prometheus"
    ports:
      - "9090:9090"
    networks:
      - food-ordering-network
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  grafana:
    image: grafana/grafana:10.4.0
    hostname: grafana
    container_name: grafana
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_password
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - "./volumes/grafana:/var/lib/grafana"
      - "./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro"
    ports:
      - "3000:3000"
    networks:
      - food-ordering-network
    secrets:
      - grafana_password
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    logging: *default-logging
    <<: *default-security
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  food-ordering-network:
    driver: bridge

volumes:
  debezium-plugins:
    driver: local
